services:
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.14.0}
    container_name: telecom_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - telecom_rag_network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: telecom_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    networks:
      - telecom_rag_network
    restart: unless-stopped
    # CPU-compatible by default.
    # To enable GPU later, install the NVIDIA container toolkit and add the
    # appropriate device reservations for your host GPU runtime.

  prometheus:
    image: prom/prometheus:latest
    container_name: telecom_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - qdrant
      - ollama
    networks:
      - telecom_rag_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: telecom_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_storage:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - telecom_rag_network
    restart: unless-stopped

  streamlit-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: telecom_streamlit_app
    ports:
      - "8501:8501"
      - "8001:8001"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_BASE_URL=http://ollama:11434
      - RAG_METRICS_HOST=0.0.0.0
      - RAG_METRICS_PORT=8001
      - ENABLE_PROMETHEUS=true
      - STREAMLIT_SERVER_HEADLESS=true
      - SMALL_GENERATION_MODEL=qwen3.5:0.8b
      - MEDIUM_GENERATION_MODEL=qwen3.5:0.8b
      - LARGE_GENERATION_MODEL=qwen3.5:0.8b
      - DEFAULT_GENERATION_MODEL=qwen3.5:0.8b
    volumes:
      - ../data/uploads:/app/data/uploads
      - ../data/logs:/app/data/logs
      - ../data/indexes:/app/data/indexes
      - ../data/knowledge_base:/app/data/knowledge_base
    depends_on:
      - qdrant
      - ollama
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - telecom_rag_network
    restart: unless-stopped

volumes:
  qdrant_storage:
  ollama_storage:
  grafana_storage:

networks:
  telecom_rag_network:
    name: telecom_rag_network
