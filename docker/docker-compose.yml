services:
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.14.0}
    container_name: telecom_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - telecom_rag_network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: telecom_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    networks:
      - telecom_rag_network
    restart: unless-stopped
    # CPU-compatible by default.
    # To enable GPU later, install the NVIDIA container toolkit and add the
    # appropriate device reservations for your host GPU runtime.

  prometheus:
    image: prom/prometheus:latest
    container_name: telecom_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - qdrant
      - ollama
    networks:
      - telecom_rag_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: telecom_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_storage:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - telecom_rag_network
    restart: unless-stopped


volumes:
  qdrant_storage:
  ollama_storage:
  grafana_storage:

networks:
  telecom_rag_network:
    name: telecom_rag_network
