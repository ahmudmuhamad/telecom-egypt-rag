global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Containerized Streamlit app exposes Prometheus metrics on port 8001.
  - job_name: rag_app
    metrics_path: /metrics
    static_configs:
      - targets: ["streamlit-app:8001"]

  # Qdrant metrics availability may depend on Qdrant configuration/version.
  - job_name: qdrant
    static_configs:
      - targets: ["qdrant:6333"]

  # For local development with Streamlit outside Docker, switch rag_app to
  # host.docker.internal:8001 or add a second target temporarily.
